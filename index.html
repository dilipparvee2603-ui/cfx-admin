<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFX Studios | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #05060b;
            --sidebar: #0a0b14;
            --panel: #0d0e1a;
            --accent: #FF2D55;
            --blue: #3b82f6;
            --text: #ffffff;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.04);
            --glass: rgba(255, 255, 255, 0.02);
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MOBILE TOGGLE --- */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 0;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-area {
            padding: 0 35px;
            margin-bottom: 50px;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 2px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span { color: var(--accent); }

        .nav-group { margin-bottom: 35px; }
        .nav-label {
            padding: 0 35px;
            font-size: 10px;
            font-weight: 900;
            color: var(--text-dim);
            letter-spacing: 2.5px;
            margin-bottom: 15px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .nav-item {
            padding: 16px 35px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            position: relative;
        }
        .nav-item i { width: 18px; height: 18px; opacity: 0.7; transition: all 0.25s; }
        
        .nav-item:hover { color: #fff; background: rgba(255, 255, 255, 0.02); }
        .nav-item:hover i { opacity: 1; transform: translateX(2px); }

        .nav-item.active {
            color: #fff;
            background: linear-gradient(90deg, rgba(255, 45, 85, 0.1) 0%, rgba(255, 45, 85, 0) 100%);
        }
        .nav-item.active i { color: var(--accent); opacity: 1; }
        
        .nav-item.active::after {
            content: '';
            position: absolute;
            left: 0; top: 15%; height: 70%; width: 3px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 15px var(--accent);
        }

        /* --- MAIN CONTENT --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            height: 80px;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 6, 11, 0.8);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }

        .header-title { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 18px; letter-spacing: -0.5px; }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        .search-container {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            width: 350px;
        }
        .search-box {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 13px;
        }

        .content-area {
            flex: 1;
            padding: 40px 50px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* --- METRICS --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }
        .metric-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .metric-card:hover { transform: translateY(-5px); }
        .metric-label { font-size: 11px; font-weight: 900; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 10px; }
        .metric-value { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 32px; }

        /* --- TABLE AREA --- */
        .table-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow-x: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th {
            text-align: left;
            padding: 20px 30px;
            font-size: 10px;
            font-weight: 900;
            color: var(--text-dim);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.01);
        }
        td {
            padding: 18px 30px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }

        .key-cell { font-family: 'JetBrains Mono', monospace; font-weight: 500; color: #fff; }
        .badge {
            font-size: 9px;
            font-weight: 950;
            padding: 3px 8px;
            border-radius: 6px;
            letter-spacing: 1px;
            display: inline-block;
            margin-top: 5px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn:hover { background: #fff; color: #000; transform: scale(1.05); }
        .btn-danger { color: var(--accent); }
        .btn-danger:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 1200px) {
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 900px) {
            /* ... previous mobile styles ... */
            
            /* Vault Mobile Grid */
            #table-container div[style*="grid-template-columns: 300px 1fr"] {
                grid-template-columns: 1fr !important;
                height: auto !important;
            }
        }
...
        function renderVault() {
            const container = document.getElementById('table-container');
            let html = `
                <div style="display: grid; grid-template-columns: 320px 1fr; gap: 25px; height: calc(100vh - 220px);">
                    <!-- SNIPPET LIST -->
                    <div style="background: var(--panel); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.3);">
                        <div style="padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.01);">
                            <div style="font-size: 10px; font-weight: 900; letter-spacing: 2px; color: var(--text-dim);">SAVED SNIPPETS</div>
                            <button class="btn" style="padding: 8px 12px; font-size: 14px; background: var(--accent); color: #fff; border: none;" onclick="addSnippet()">+</button>
                        </div>
                        <div style="flex: 1; overflow-y: auto; padding: 15px;">
            `;

            if (vaultSnippets.length === 0) {
                html += `<div style="text-align: center; color: var(--text-dim); padding: 40px; font-size: 12px; opacity: 0.5;">NO SNIPPETS FOUND</div>`;
            }

            vaultSnippets.forEach((s, idx) => {
                const isActive = activeSnippet === idx;
                html += `
                    <div onclick="editSnippet(${idx})" style="padding: 20px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; background: ${isActive ? 'linear-gradient(90deg, rgba(255,45,85,0.08) 0%, rgba(255,45,85,0.02) 100%)' : 'rgba(255,255,255,0.01)'}; border: 1px solid ${isActive ? 'var(--accent)' : 'var(--border)'}; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;">
                        <div style="font-size: 14px; font-weight: 700; color: ${isActive ? '#fff' : 'var(--text)'}; margin-bottom: 6px;">${s.title || 'Untitled Snippet'}</div>
                        <div style="font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${s.content || 'No content...'}</div>
                        ${isActive ? '<div style="position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--accent); box-shadow: 2px 0 10px var(--accent);"></div>' : ''}
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>
                    <!-- SNIPPET EDITOR -->
                    <div id="snippet-editor" style="background: var(--panel); border-radius: 24px; border: 1px solid var(--border); padding: 35px; display: flex; flex-direction: column; box-shadow: 0 15px 40px rgba(0,0,0,0.3);">
                        <div style="text-align: center; padding: 100px 40px; color: var(--text-dim);">
                            <i data-lucide="file-key" style="width: 56px; height: 56px; margin-bottom: 25px; opacity: 0.15; color: var(--accent);"></i>
                            <h3 style="font-family: 'Outfit'; color: #fff; margin-bottom: 10px;">VAULT DECRYPTED</h3>
                            <p style="font-size: 13px; max-width: 300px; margin: 0 auto; line-height: 1.6;">Select a credential or script from the left to view or edit details.</p>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            lucide.createIcons();
        }

        @media (max-width: 600px) {
            .metrics-grid { grid-template-columns: 1fr; }
            .header-title { display: none; }
            .metric-value { font-size: 20px; }
            .table-panel { border-radius: 16px; }
            td, th { padding: 15px 20px; font-size: 12px; }
        }

        .pagination {
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
        }
        .page-info { font-size: 11px; font-weight: 900; color: var(--text-dim); letter-spacing: 1px; }

        .loading {
            padding: 100px;
            text-align: center;
            font-weight: 950;
            letter-spacing: 5px;
            color: var(--text-dim);
            font-size: 12px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>

    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="logo"><i data-lucide="shield-check" style="color: var(--accent); width: 24px; height: 24px;"></i> CFX<span>STUDIOS</span></div>
            <div style="font-size: 9px; color: var(--text-dim); font-weight: 950; margin-top: 5px; letter-spacing: 2px;">COMMAND CENTER</div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Platforms</div>
            <div class="nav-item active" id="nav-windows" onclick="switchView('windows')">
                <i data-lucide="monitor"></i>
                WINDOWS
            </div>
            <div class="nav-item" id="nav-android" onclick="switchView('android')">
                <i data-lucide="smartphone"></i>
                ANDROID
            </div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Monitoring</div>
            <div class="nav-item" id="nav-trials" onclick="switchView('trials')">
                <i data-lucide="clock"></i>
                GUEST TRIALS
            </div>
            <div class="nav-item" id="nav-broadcast" onclick="switchView('broadcast')">
                <i data-lucide="radio"></i>
                BROADCAST
            </div>
            <div class="nav-item" id="nav-vault" onclick="switchView('vault')">
                <i data-lucide="lock"></i>
                MASTER VAULT
            </div>
        </div>

        <div class="nav-group" style="margin-top: auto; padding-bottom: 20px;">
            <div class="nav-label">System</div>
            <div class="nav-item btn-danger" onclick="flushAllKeys()">
                <i data-lucide="trash-2"></i>
                MASTER FLUSH
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <header>
            <div class="header-title" id="view-title">WINDOWS WORKSTATION LICENSES</div>
            <div class="header-actions">
                <select id="status-filter" class="search-box" style="width: 150px; background: var(--glass); border: 1px solid var(--border); padding: 10px; border-radius: 12px; font-weight: 700; color: #fff; outline: none; cursor: pointer;" onchange="filterData()">
                    <option value="all" style="background: var(--sidebar); color: #fff;">ALL STATUS</option>
                    <option value="activated" style="background: var(--sidebar); color: #fff;">ACTIVATED</option>
                    <option value="not-activated" style="background: var(--sidebar); color: #fff;">AVAILABLE</option>
                </select>
                <div class="search-container">
                    <input type="text" class="search-box" id="search" placeholder="Search keys or users..." oninput="filterData()">
                </div>
                <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px;">AD</div>
            </div>
        </header>

        <div class="content-area">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Total Keys</div>
                    <div class="metric-value" id="stat-total-keys">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Activated</div>
                    <div class="metric-value" id="stat-activated" style="color: var(--blue);">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Remaining</div>
                    <div class="metric-value" id="stat-remaining" style="color: #10b981;">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Trials Active</div>
                    <div class="metric-value" id="stat-active-trials" style="color: var(--accent);">--</div>
                </div>
            </div>

            <div class="table-panel">
                <div id="table-container">
                    <div class="loading">CONNECTING TO CFX CLOUD...</div>
                </div>
                <div class="pagination" id="pagination-controls" style="display: none;">
                    <div class="page-info" id="page-info">PAGE 1 OF 1</div>
                    <div class="page-btns" style="display: flex; gap: 10px;">
                        <button class="btn" onclick="changePage(-1)">PREV</button>
                        <button class="btn" onclick="changePage(1)">NEXT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FB_URL = "https://cfx-scenepack-creator-default-rtdb.firebaseio.com";
        const FB_SECRET = "YH6mWhfrTk0SuHuLUOoX81xgJw5VxM91B3JdFiTf";

        let allLicenses = [];
        let allTrials = [];
        let currentView = 'windows';
        let currentPage = 1;
        const PAGE_SIZE = 20;

        async function fetchData() {
            try {
                const lResp = await fetch(`${FB_URL}/licenses.json?auth=${FB_SECRET}`);
                const lData = await lResp.json();
                
                const tResp = await fetch(`${FB_URL}/trials.json?auth=${FB_SECRET}`);
                const tData = await tResp.json();

                allLicenses = lData ? Object.keys(lData).map(k => ({ id: k, ...lData[k] })) : [];
                allTrials = tData ? Object.keys(tData).map(k => ({ id: k, ...tData[k] })) : [];

                updateStats();
                renderTable();
            } catch (err) {
                console.error(err);
                document.getElementById('table-container').innerHTML = `<div class="loading" style="color: var(--accent)">CLOUD CONNECTION LOST</div>`;
            }
        }

        function updateStats() {
            const activated = allLicenses.filter(l => l.email || l.userEmail || l.status === 'ACTIVE').length;
            const remaining = allLicenses.length - activated;
            document.getElementById('stat-total-keys').innerText = allLicenses.length;
            document.getElementById('stat-activated').innerText = activated;
            document.getElementById('stat-remaining').innerText = remaining;
            document.getElementById('stat-active-trials').innerText = allTrials.length;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function switchView(view) {
            currentView = view;
            currentPage = 1;
            
            // Close sidebar on mobile
            if (window.innerWidth <= 900) {
                document.getElementById('sidebar').classList.remove('active');
            }

            const filter = document.getElementById('status-filter');
            const metrics = document.getElementById('metrics-grid');
            const search = document.querySelector('.search-container');
            const titleEl = document.getElementById('view-title');

            if (view === 'windows' || view === 'android' || view === 'trials') {
                filter.style.display = (view === 'trials') ? 'none' : 'block';
                metrics.style.display = 'grid';
                search.style.display = 'flex';
                titleEl.innerText = view.toUpperCase() + (view === 'trials' ? ' GUEST TRIALS' : ' WORKSTATION LICENSES');
            } else if (view === 'broadcast') {
                filter.style.display = 'none';
                metrics.style.display = 'none';
                search.style.display = 'none';
                titleEl.innerText = 'GLOBAL BROADCAST HUB';
            } else if (view === 'vault') {
                filter.style.display = 'none';
                metrics.style.display = 'none';
                search.style.display = 'none';
                titleEl.innerText = 'MASTER VAULT SNIPPETS';
            }

            const pagination = document.getElementById('pagination-controls');
            if (view === 'windows' || view === 'android' || view === 'trials') {
                pagination.style.display = 'flex';
            } else {
                pagination.style.display = 'none';
            }

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById(`nav-${view}`).classList.add('active');

            if (view === 'vault' || view === 'broadcast') {
                fetchData();
            } else {
                fetchData().then(() => renderTable());
            }
        }

        async function revokeLicense(id) {
            if(!confirm(`PERMANENTLY DELETE key ${id}?`)) return;
            await fetch(`${FB_URL}/licenses/${id}.json?auth=${FB_SECRET}`, { method: 'DELETE' });
            fetchData();
        }

        async function flushAllKeys() {
            const code = prompt("Type 'FLUSH' to confirm global database wipe:");
            if(code !== 'FLUSH') return;
            await fetch(`${FB_URL}/licenses.json?auth=${FB_SECRET}`, { method: 'DELETE' });
            fetchData();
        }

        async function clearDevices(id) {
            if(!confirm(`Reset system slots for ${id}?`)) return;
            await fetch(`${FB_URL}/licenses/${id}/devices.json?auth=${FB_SECRET}`, { method: 'DELETE' });
            fetchData();
        }

        function filterData() {
            currentPage = 1;
            renderTable();
            lucide.createIcons();
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
            lucide.createIcons();
        }

        function renderTable() {
            const query = document.getElementById('search').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            let html = `<table><thead><tr>`;
            
            if(currentView === 'windows' || currentView === 'android') {
                html += `<th>License Key</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
                let filtered = [...allLicenses].sort((a, b) => b.id.length - a.id.length);
                if(currentView === 'windows') filtered = filtered.filter(l => l.id.length > 10);
                if(currentView === 'android') filtered = filtered.filter(l => l.id.length <= 10);

                // Apply Status Filter
                if (statusFilter === 'activated') {
                    filtered = filtered.filter(l => l.email || l.userEmail || l.status === 'ACTIVE');
                } else if (statusFilter === 'not-activated') {
                    filtered = filtered.filter(l => !(l.email || l.userEmail || l.status === 'ACTIVE'));
                }

                filtered = filtered.filter(l => 
                    l.id.toLowerCase().includes(query) || 
                    (l.email && l.email.toLowerCase().includes(query)) || 
                    (l.userEmail && l.userEmail.toLowerCase().includes(query))
                );

                const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
                currentPage = Math.max(1, Math.min(currentPage, totalPages));
                const pageData = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

                document.getElementById('pagination-controls').style.display = 'flex';
                document.getElementById('page-info').innerText = `PAGE ${currentPage} OF ${totalPages}`;

                pageData.forEach(l => {
                    const devCount = l.devices ? Object.keys(l.devices).length : (l.deviceId ? 1 : 0);
                    const email = l.email || l.userEmail;
                    const isActivated = !!email || l.status === 'ACTIVE';
                    const isWindows = l.id.length > 10;
                    
                    const statusText = isActivated ? (email ? email.toUpperCase() : 'ACTIVE') : 'NOT ACTIVATED';
                    const statusColor = isActivated ? (isWindows ? 'var(--accent)' : 'var(--blue)') : 'var(--text-dim)';
                    const badgeBg = isWindows ? 'rgba(255, 45, 85, 0.1)' : 'rgba(59, 130, 246, 0.1)';
                    const badgeColor = isWindows ? 'var(--accent)' : 'var(--blue)';
                    
                    html += `
                        <tr>
                            <td class="key-cell">
                                ${l.id.replace(/_/g, '-')}
                                <br><span class="badge" style="color: ${badgeColor}; background: ${badgeBg}">${isWindows ? 'WINDOWS' : 'ANDROID'}</span>
                            </td>
                            <td style="font-weight: 800; font-size: 11px; color: ${statusColor}; letter-spacing: 0.5px;">${statusText}</td>
                            <td>
                                <button class="btn" onclick="clearDevices('${l.id}')">RESET</button>
                                <button class="btn btn-danger" onclick="revokeLicense('${l.id}')" style="margin-left: 8px;">DELETE</button>
                            </td>
                        </tr>
                    `;
                });
                html += `</tbody></table>`;
            } else if(currentView === 'trials') {
                html += `<th>Hardware ID</th><th>Start Date</th><th>Time Elapsed</th><th>Actions</th></tr></thead><tbody>`;
                const filtered = allTrials.filter(t => t.id.toLowerCase().includes(query));
                const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
                currentPage = Math.max(1, Math.min(currentPage, totalPages));
                const pageData = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

                document.getElementById('pagination-controls').style.display = 'flex';
                document.getElementById('page-info').innerText = `PAGE ${currentPage} OF ${totalPages}`;

                pageData.forEach(t => {
                    const date = new Date(t.start_time * 1000);
                    const elapsed = ((Date.now() / 1000) - t.start_time) / 3600;
                    html += `
                        <tr>
                            <td class="key-cell">${t.id}</td>
                            <td style="color: var(--text-dim); font-size: 11px;">${date.toLocaleString()}</td>
                            <td style="font-weight: 800; color: var(--blue); font-size: 11px;">${elapsed.toFixed(1)} HOURS</td>
                            <td>
                                <button class="btn btn-danger" onclick="wipeTrial('${t.id}')">WIPE TRIAL</button>
                            </td>
                        </tr>
                    `;
                });
                html += `</tbody></table>`;
            } else if(currentView === 'broadcast') {
                document.getElementById('pagination-controls').style.display = 'none';
                html = `
                    <div style="padding: 40px; background: var(--glass); border-radius: 20px; border: 1px solid var(--border);">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <label style="font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase;">Broadcast Configuration</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <div id="bc-status" style="font-size: 9px; font-weight: 900; color: var(--text-dim); opacity: 0.6;">READY</div>
                                <button class="btn" style="padding: 5px 12px; font-size: 9px;" onclick="fetchGistContent()">REFRESH DATA</button>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px;">GITHUB TOKEN (PAT)</label>
                                <input type="password" id="bc-token" placeholder="ghp_..." oninput="saveCredentials()" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
                            </div>
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px;">BROADCAST TARGET</label>
                                <select id="bc-target" onchange="loadCredentials()" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
                                    <option value="desktop">DESKTOP WORKSTATION</option>
                                    <option value="mobile">MOBILE APP</option>
                                </select>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px;">GIST ID (FOR TARGET)</label>
                                <input type="text" id="bc-gistid" placeholder="Paste Gist ID here" oninput="saveCredentials()" onchange="fetchGistContent()" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
                            </div>
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px;">GIST FILENAME</label>
                                <input type="text" id="bc-filename" placeholder="e.g. gistfile1.txt" oninput="saveCredentials()" onchange="fetchGistContent()" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px;">LATEST LIVE VERSION</label>
                                <input type="text" id="bc-version" placeholder="e.g. 5.5.0" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
                            </div>
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px;">MESSAGE TYPE</label>
                                <select id="bc-type" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none; cursor: pointer;">
                                    <option value="message" style="background: var(--sidebar); color: #fff;">MESSAGE / ANNOUNCEMENT</option>
                                    <option value="update" style="background: var(--sidebar); color: #fff;">SOFTWARE UPDATE</option>
                                    <option value="warning" style="background: var(--sidebar); color: #fff;">MAINTENANCE ALERT</option>
                                </select>
                            </div>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px;">ANNOUNCEMENT MESSAGE</label>
                            <textarea id="bc-msg" placeholder="Type your global announcement here..." style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; height: 80px; outline: none; resize: none;"></textarea>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px;">UPCOMING FEATURES (COMMA SEPARATED)</label>
                            <input type="text" id="bc-upcoming" placeholder="e.g. 4K Support, Cloud Sync, UI Themes" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
                        </div>
                        <div style="margin-bottom: 30px;">
                            <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px;">REDIRECT URL (OPTIONAL)</label>
                            <input type="text" id="bc-url" placeholder="https://..." style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
                        </div>
                        <button class="btn" id="btn-push" style="width: 100%; padding: 20px; background: var(--accent); color: #fff; border: none; font-size: 13px;" onclick="pushBroadcast()">PUSH GLOBAL BROADCAST</button>
                    </div>
                `;
                setTimeout(loadCredentials, 0);
            }

            document.getElementById('table-container').innerHTML = html;
        }

        // Load Credentials
        function loadCredentials() {
            const target = document.getElementById('bc-target').value;
            document.getElementById('bc-token').value = localStorage.getItem('cfx_github_token') || '';
            document.getElementById('bc-gistid').value = localStorage.getItem(`cfx_gist_${target}`) || '';
            document.getElementById('bc-filename').value = localStorage.getItem(`cfx_file_${target}`) || 'gistfile1.txt';
            
            if (localStorage.getItem(`cfx_gist_${target}`)) {
                fetchGistContent();
            }
        }

        async function fetchGistContent() {
            const token = document.getElementById('bc-token').value;
            const gistId = document.getElementById('bc-gistid').value;
            const filename = document.getElementById('bc-filename').value || 'gistfile1.txt';
            const status = document.getElementById('bc-status');

            if (!token || !gistId) return;

            if (status) {
                status.innerText = "FETCHING...";
                status.style.color = "var(--blue)";
            }

            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.files && data.files[filename]) {
                        const content = JSON.parse(data.files[filename].content);
                        document.getElementById('bc-version').value = content.version || '';
                        document.getElementById('bc-msg').value = content.message || '';
                        document.getElementById('bc-type').value = content.type || 'message';
                        document.getElementById('bc-url').value = content.url || '';
                        document.getElementById('bc-upcoming').value = (content.upcoming || []).join(', ');
                        
                        if (status) {
                            status.innerText = "SYNCED";
                            status.style.color = "#10b981";
                        }
                    } else {
                        if (status) {
                            status.innerText = "FILE NOT FOUND";
                            status.style.color = "var(--accent)";
                        }
                    }
                } else {
                    if (status) {
                        status.innerText = "GIST NOT FOUND";
                        status.style.color = "var(--accent)";
                    }
                }
            } catch (e) {
                console.error("Gist Fetch Error:", e);
                if (status) {
                    status.innerText = "NETWORK ERROR";
                    status.style.color = "var(--accent)";
                }
            }
        }

        // Save Credentials
        function saveCredentials() {
            const target = document.getElementById('bc-target').value;
            const token = document.getElementById('bc-token').value;
            const gistId = document.getElementById('bc-gistid').value;
            const filename = document.getElementById('bc-filename').value;
            
            if(token) localStorage.setItem('cfx_github_token', token);
            if(gistId) localStorage.setItem(`cfx_gist_${target}`, gistId);
            if(filename) localStorage.setItem(`cfx_file_${target}`, filename);
        }

        async function pushBroadcast() {
            const token = document.getElementById('bc-token').value;
            const gistId = document.getElementById('bc-gistid').value;
            const filename = document.getElementById('bc-filename').value || 'gistfile1.txt';
            const version = document.getElementById('bc-version').value;
            const message = document.getElementById('bc-msg').value;
            const type = document.getElementById('bc-type').value;
            const url = document.getElementById('bc-url').value;
            const upcomingRaw = document.getElementById('bc-upcoming').value;
            const btn = document.getElementById('btn-push');

            if(!token || !gistId || !message) {
                alert("TOKEN, GIST ID, AND MESSAGE ARE REQUIRED");
                return;
            }

            saveCredentials(); // Persist for next time

            if(!confirm(`Push this ${type.toUpperCase()} to all ${document.getElementById('bc-target').value} workstations?`)) return;

            btn.innerText = "UPLOADING TO GITHUB...";
            btn.disabled = true;

            // Parse upcoming into array
            const upcoming = upcomingRaw ? upcomingRaw.split(',').map(s => s.trim()).filter(s => s !== "") : [];

            const payload = JSON.stringify({
                version: version,
                message: message,
                type: type,
                url: url,
                upcoming: upcoming,
                timestamp: Math.floor(Date.now() / 1000)
            }, null, 2);

            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            [filename]: {
                                content: payload
                            }
                        }
                    })
                });

                if (response.ok) {
                    const targetName = document.getElementById('bc-target').value.toUpperCase();
                    alert(`BROADCAST LIVE ON ALL ${targetName} INSTANCES`);
                } else {
                    const err = await response.json();
                    alert("GITHUB ERROR: " + (err.message || "Check Token/Gist ID"));
                }
            } catch (e) {
                alert("NETWORK ERROR: " + e.message);
            } finally {
                btn.innerText = "PUSH GLOBAL BROADCAST";
                btn.disabled = false;
            }
        }

        async function wipeTrial(id) {
            if(!confirm(`Wipe trial record ${id}?`)) return;
            await fetch(`${FB_URL}/trials/${id}.json?auth=${FB_SECRET}`, { method: 'DELETE' });
            fetchData();
        }

        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
