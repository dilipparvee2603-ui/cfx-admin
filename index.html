<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFX Studios | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030407;
            --panel: #0a0b14;
            --sidebar: #05060b;
            --accent: #ff2d55;
            --accent-glow: rgba(255, 45, 85, 0.4);
            --blue: #3b82f6;
            --blue-glow: rgba(59, 130, 246, 0.3);
            --text: #ffffff;
            --text-dim: #8a8fb5;
            --border: #1e2230;
            --glass: rgba(255, 255, 255, 0.02);
            --font-main: 'Inter', sans-serif;
            --font-head: 'Outfit', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main); 
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 0;
            z-index: 100;
        }

        .logo-area { padding: 0 40px; margin-bottom: 50px; }
        .logo {
            font-family: var(--font-head);
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

        .nav-group { margin-bottom: 35px; }
        .nav-label {
            padding: 0 40px;
            font-size: 10px;
            font-weight: 900;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .nav-item {
            padding: 16px 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            position: relative;
        }
        .nav-item i { width: 18px; height: 18px; opacity: 0.4; }
        .nav-item:hover { color: #fff; background: rgba(255, 255, 255, 0.01); }
        .nav-item.active { 
            color: #fff; 
            background: linear-gradient(90deg, rgba(255, 45, 85, 0.1) 0%, transparent 100%); 
        }
        .nav-item.active i { color: var(--accent); opacity: 1; filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .nav-item.active::after {
            content: '';
            position: absolute; left: 0; top: 20%; height: 60%; width: 3px;
            background: var(--accent); border-radius: 0 4px 4px 0; box-shadow: 0 0 15px var(--accent);
        }

        /* --- WRAPPER --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at 10% 10%, rgba(255, 45, 85, 0.02) 0%, transparent 50%);
        }

        header {
            height: 90px;
            min-height: 90px;
            padding: 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(3, 4, 7, 0.8);
            backdrop-filter: blur(20px);
            z-index: 50;
        }

        .header-title { 
            font-family: var(--font-head);
            font-weight: 900; font-size: 24px; 
            letter-spacing: 1px; text-transform: uppercase;
        }

        .header-actions { display: flex; align-items: center; gap: 20px; }

        .content-area {
            flex: 1;
            padding: 40px 50px;
            overflow-y: auto;
        }

        /* --- COMPONENTS --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }
        .metric-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 24px;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .metric-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.1); }
        .metric-label { font-size: 11px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
        .metric-value { font-family: var(--font-head); font-weight: 900; font-size: 38px; color: #fff; }

        .table-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            padding: 20px 35px;
            font-size: 10px; font-weight: 900;
            color: var(--text-dim); letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.01);
            text-align: left;
        }
        td { padding: 25px 35px; border-bottom: 1px solid var(--border); }
        
        .key-cell { display: flex; flex-direction: column; gap: 5px; }
        .key-text { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: #fff; font-size: 14px; letter-spacing: 0.5px; }
        .key-platform { font-size: 9px; font-weight: 900; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; }

        .status-badge {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .actions-cell {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }

        .search-box {
            background: var(--sidebar);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 14px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: 0.3s;
            width: 300px;
        }
        .search-box:focus { border-color: var(--blue); box-shadow: 0 0 15px var(--blue-glow); }

        .btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { background: var(--glass); border-color: rgba(255,255,255,0.1); }
        .btn-accent { background: var(--accent); border: none; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-accent:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .btn-danger { color: #f87171; border-color: rgba(248, 113, 113, 0.2); }
        .btn-danger:hover { background: rgba(248, 113, 113, 0.1); border-color: #f87171; }

        .loading {
            padding: 100px;
            text-align: center;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        @media (max-width: 1100px) {
            .sidebar { width: 80px; min-width: 80px; padding: 40px 0; }
            .logo-area, .nav-label { display: none; }
            .nav-item { padding: 20px; justify-content: center; }
            .nav-item i { margin: 0; }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .pagination {
            padding: 25px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
            border-top: 1px solid var(--border);
        }
        .page-info { font-size: 11px; font-weight: 900; color: var(--text-dim); letter-spacing: 1px; }

    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="logo"><i data-lucide="shield-check" style="color: var(--accent); width: 24px; height: 24px;"></i> CFX<span>STUDIOS</span></div>
            <div style="font-size: 9px; color: var(--text-dim); font-weight: 950; margin-top: 5px; letter-spacing: 2px;">COMMAND CENTER</div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Platforms</div>
            <div class="nav-item active" id="nav-windows" onclick="switchView('windows')">
                <i data-lucide="monitor"></i> WINDOWS
            </div>
            <div class="nav-item" id="nav-android" onclick="switchView('android')">
                <i data-lucide="smartphone"></i> ANDROID
            </div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Monitoring</div>
            <div class="nav-item" id="nav-trials" onclick="switchView('trials')">
                <i data-lucide="clock"></i> GUEST TRIALS
            </div>
            <div class="nav-item" id="nav-broadcast" onclick="switchView('broadcast')">
                <i data-lucide="radio"></i> BROADCAST
            </div>
            <div class="nav-item" id="nav-vault" onclick="switchView('vault')">
                <i data-lucide="lock"></i> MASTER VAULT
            </div>
        </div>

        <div class="nav-group" style="margin-top: auto; padding-bottom: 20px;">
            <div class="nav-label">System</div>
            <div class="nav-item btn-danger" onclick="flushAllKeys()">
                <i data-lucide="trash-2"></i> MASTER FLUSH
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <header>
            <div class="header-title" id="view-title">WINDOWS WORKSTATION LICENSES</div>
            <div class="header-actions">
                <button class="btn btn-accent" style="background: var(--blue); box-shadow: 0 10px 20px var(--blue-glow);" onclick="fetchData(true)">
                    <i data-lucide="refresh-cw" style="width: 14px; height: 14px;"></i> SYNC NOW
                </button>
                <select id="status-filter" class="search-box" style="width: 150px;" onchange="filterData()">
                    <option value="all">ALL STATUS</option>
                    <option value="activated">ACTIVATED</option>
                    <option value="not-activated">AVAILABLE</option>
                </select>
                <input type="text" class="search-box" id="search" placeholder="Search keys or users..." oninput="filterData()">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; box-shadow: 0 0 15px var(--accent-glow);">AD</div>
            </div>
        </header>

        <div class="content-area">
            <div class="metrics-grid" id="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Total Workstations</div>
                    <div class="metric-value" id="stat-total-keys">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Active Licenses</div>
                    <div class="metric-value" id="stat-activated" style="color: var(--blue);">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Available Slots</div>
                    <div class="metric-value" id="stat-remaining" style="color: #10b981;">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Trial Sessions</div>
                    <div class="metric-value" id="stat-active-trials" style="color: var(--accent);">--</div>
                </div>
            </div>

            <div class="table-panel">
                <div id="table-container">
                    <div class="loading">INITIALIZING COMMAND DECK...</div>
                </div>
                <div class="pagination" id="pagination-controls" style="display: none;">
                    <div class="page-info" id="page-info">PAGE 1 OF 1</div>
                    <div class="page-btns" style="display: flex; gap: 10px;">
                        <button class="btn" onclick="changePage(-1)">PREV</button>
                        <button class="btn" onclick="changePage(1)">NEXT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL FOR ADD/EDIT -->
    <div id="license-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: var(--panel); width: 450px; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.5);">
            <h2 id="modal-title" style="font-family: 'Outfit'; margin-bottom: 25px;">ADD LICENSE</h2>
            <input type="hidden" id="edit-id">
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 1px;">LICENSE KEY</label>
                <input type="text" id="modal-key" placeholder="Enter key or leave for auto-gen" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none; font-family: 'JetBrains Mono';">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 1px;">USER EMAIL / ID</label>
                <input type="text" id="modal-email" placeholder="user@example.com" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
            </div>

            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button class="btn" style="flex: 1;" onclick="closeModal()">CANCEL</button>
                <button class="btn btn-accent" style="flex: 1;" onclick="saveLicense()">SAVE LICENSE</button>
            </div>
        </div>
    </div>

    <script>
        const FB_URL = "https://cfx-scenepack-creator-default-rtdb.firebaseio.com";
        const FB_SECRET = "YH6mWhfrTk0SuHuLUOoX81xgJw5VxM91B3JdFiTf";

        let allLicenses = [];
        let allTrials = [];
        let currentView = 'windows';
        let currentPage = 1;
        const PAGE_SIZE = 20;
        let initialSyncDone = false;

        async function fetchData(force = false) {
            const container = document.getElementById('table-container');
            if (currentView === 'vault') {
                if (force) vaultSnippets = [];
                return await fetchVault();
            }
            if (currentView === 'broadcast') return renderBroadcastView();

            if (!allLicenses.length || force) {
                container.innerHTML = '<div class="loading">SYNCHRONIZING WITH CLOUD...</div>';
            }
            
            try {
                const [lRes, tRes] = await Promise.all([
                    fetch(`${FB_URL}/licenses.json?auth=${FB_SECRET}`),
                    fetch(`${FB_URL}/trials.json?auth=${FB_SECRET}`)
                ]);
                const lData = await lRes.json();
                const tData = await tRes.json();
                
                allLicenses = lData ? Object.keys(lData).map(k => ({ id: k, ...lData[k] })) : [];
                allTrials = tData ? Object.keys(tData).map(k => ({ id: k, ...tData[k] })) : [];
                
                initialSyncDone = true;
                updateStats();
                renderTable();
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color: var(--accent);">CLOUD CONNECTION LOST</div>`;
            }
        }

        function renderTable() {
            const query = document.getElementById('search').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            let html = `<table><thead><tr><th>LICENSE KEY</th><th>STATUS</th><th style="text-align: right;">ACTIONS</th></tr></thead><tbody>`;
            
            if(currentView === 'windows' || currentView === 'android') {
                let filtered = [...allLicenses];
                if(currentView === 'windows') filtered = filtered.filter(l => l.id.length > 10);
                if(currentView === 'android') filtered = filtered.filter(l => l.id.length <= 10);

                if (statusFilter === 'activated') filtered = filtered.filter(l => l.email || l.userEmail);
                else if (statusFilter === 'not-activated') filtered = filtered.filter(l => !(l.email || l.userEmail));

                filtered = filtered.filter(l => l.id.toLowerCase().includes(query) || (l.email && l.email.toLowerCase().includes(query)));

                const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
                currentPage = Math.max(1, Math.min(currentPage, totalPages));
                const pageData = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

                document.getElementById('pagination-controls').style.display = 'flex';
                document.getElementById('page-info').innerText = `PAGE ${currentPage} OF ${totalPages}`;

                pageData.forEach(l => {
                    const isActivated = !!(l.email || l.userEmail);
                    const statusText = isActivated ? (l.email || l.userEmail).toUpperCase() : 'NOT ACTIVATED';
                    const statusColor = isActivated ? 'var(--blue)' : 'var(--text-dim)';
                    
                    html += `
                        <tr>
                            <td>
                                <div class="key-cell">
                                    <div class="key-text">${l.id.replace(/_/g, '-')}</div>
                                    <div class="key-platform">${currentView}</div>
                                </div>
                            </td>
                            <td>
                                <div class="status-badge" style="color: ${statusColor}">
                                    <div style="width: 6px; height: 6px; border-radius: 50%; background: ${statusColor}; box-shadow: 0 0 10px ${statusColor}"></div>
                                    ${statusText}
                                </div>
                            </td>
                            <td>
                                <div class="actions-cell">
                                    <button class="btn" onclick="openModal('${l.id}', '${l.id}')"><i data-lucide="edit-3" style="width: 12px; height: 12px;"></i> RESET</button>
                                    <button class="btn btn-danger" onclick="deleteLicense('${l.id}')"><i data-lucide="trash-2" style="width: 12px; height: 12px;"></i> DELETE</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } else if (currentView === 'trials') {
                const filtered = allTrials.filter(t => t.id.toLowerCase().includes(query));
                filtered.forEach(t => {
                    html += `
                        <tr>
                            <td><div class="key-text">${t.id}</div></td>
                            <td><div class="status-badge" style="color: var(--accent)">TRIAL ACTIVE</div></td>
                            <td><div class="actions-cell"><button class="btn btn-danger" onclick="wipeTrial('${t.id}')">WIPE</button></div></td>
                        </tr>
                    `;
                });
            }
            document.getElementById('table-container').innerHTML = html + `</tbody></table>`;
            lucide.createIcons();
        }

        async function switchView(view) {
            currentView = view;
            currentPage = 1;

            const metrics = document.getElementById('metrics-grid');
            const pagination = document.getElementById('pagination-controls');
            const filter = document.getElementById('status-filter');
            const search = document.getElementById('search');
            const titleEl = document.getElementById('view-title');

            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${view}`);
            if (activeNav) activeNav.classList.add('active');

            metrics.style.display = (['windows', 'android', 'trials'].includes(view)) ? 'grid' : 'none';
            pagination.style.display = (['windows', 'android', 'trials'].includes(view)) ? 'flex' : 'none';
            filter.style.display = (['windows', 'android'].includes(view)) ? 'block' : 'none';
            search.style.display = (['windows', 'android', 'trials'].includes(view)) ? 'block' : 'none';
            
            const titles = {
                'windows': 'WINDOWS WORKSTATION LICENSES',
                'android': 'ANDROID MOBILE LICENSES',
                'trials': 'GUEST TRIAL SESSIONS',
                'broadcast': 'GLOBAL BROADCAST HUB',
                'vault': 'MASTER VAULT SNIPPETS'
            };
            titleEl.innerText = titles[view] || 'COMMAND CENTER';

            await fetchData();
        }

        async function fetchData(force = false) {
            const container = document.getElementById('table-container');
            if (currentView === 'vault') return await fetchVault();
            if (currentView === 'broadcast') return renderBroadcastView();

            if (!allLicenses.length || force) {
                container.innerHTML = '<div class="loading">SYNCHRONIZING WITH CLOUD...</div>';
            }
            
            try {
                const [lRes, tRes] = await Promise.all([
                    fetch(`${FB_URL}/licenses.json?auth=${FB_SECRET}`),
                    fetch(`${FB_URL}/trials.json?auth=${FB_SECRET}`)
                ]);
                const lData = await lRes.json();
                const tData = await tRes.json();
                allLicenses = lData ? Object.keys(lData).map(k => ({ id: k, ...lData[k] })) : [];
                allTrials = tData ? Object.keys(tData).map(k => ({ id: k, ...tData[k] })) : [];
                initialSyncDone = true;
                updateStats();
                renderTable();
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color: var(--accent);">CLOUD CONNECTION LOST</div>`;
            }
        }

        function updateStats() {
            const activated = allLicenses.filter(l => l.email || l.userEmail).length;
            document.getElementById('stat-total-keys').innerText = allLicenses.length;
            document.getElementById('stat-activated').innerText = activated;
            document.getElementById('stat-remaining').innerText = allLicenses.length - activated;
            document.getElementById('stat-active-trials').innerText = allTrials.length;
        }

        function openModal(id = '', key = '') {
            document.getElementById('edit-id').value = id;
            document.getElementById('modal-key').value = key;
            document.getElementById('modal-email').value = '';
            document.getElementById('modal-title').innerText = id ? 'RESET LICENSE' : 'ADD LICENSE';
            document.getElementById('license-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('license-modal').style.display = 'none'; }

        async function saveLicense() {
            const id = document.getElementById('edit-id').value;
            const key = document.getElementById('modal-key').value || `CFX-${Math.random().toString(36).substr(2, 9).toUpperCase()}`;
            const email = document.getElementById('modal-email').value;
            
            const data = { id: key, email: email, status: email ? 'ACTIVE' : 'AVAILABLE' };
            await fetch(`${FB_URL}/licenses/${key}.json?auth=${FB_SECRET}`, { method: 'PUT', body: JSON.stringify(data) });
            closeModal();
            fetchData(true);
        }

        async function deleteLicense(id) {
            if(!confirm("DELETE LICENSE?")) return;
            await fetch(`${FB_URL}/licenses/${id}.json?auth=${FB_SECRET}`, { method: 'DELETE' });
            fetchData(true);
        }

        async function wipeTrial(id) {
            if(!confirm("WIPE TRIAL?")) return;
            await fetch(`${FB_URL}/trials/${id}.json?auth=${FB_SECRET}`, { method: 'DELETE' });
            fetchData(true);
        }

        async function flushAllKeys() {
            if(prompt("Type 'FLUSH' to confirm:") === 'FLUSH') {
                await fetch(`${FB_URL}/licenses.json?auth=${FB_SECRET}`, { method: 'DELETE' });
                fetchData(true);
            }
        }

        // --- VAULT ENGINE ---
        let vaultSnippets = [];
        let activeSnippetId = null;

        async function fetchVault() {
            const token = localStorage.getItem('cfx_github_token');
            const gistId = localStorage.getItem('cfx_vault_gistid');
            if(!token || !gistId) return renderVaultSetup();

            const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, { headers: { 'Authorization': `token ${token}` } });
            const data = await res.json();
            vaultSnippets = data.files['vault.json'] ? JSON.parse(data.files['vault.json'].content) : [];
            renderVault();
        }

        function renderVault() {
            const container = document.getElementById('table-container');
            container.innerHTML = `
                <div style="display: grid; grid-template-columns: 320px 1fr; gap: 25px; height: calc(100vh - 250px);">
                    <!-- Sidebar List -->
                    <div style="background: var(--panel); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.3);">
                        <div style="padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.01);">
                            <div style="font-size: 10px; font-weight: 900; letter-spacing: 2px; color: var(--text-dim);">MASTER VAULT</div>
                            <button class="btn btn-accent" style="padding: 8px 12px; font-size: 11px;" onclick="addSnippet()">NEW PASTE</button>
                        </div>
                        <div style="flex: 1; overflow-y: auto; padding: 15px;" id="vault-list"></div>
                    </div>

                    <!-- Editor Hub -->
                    <div id="vault-editor" style="background: var(--panel); border-radius: 24px; border: 1px solid var(--border); padding: 35px; display: flex; flex-direction: column; box-shadow: 0 15px 40px rgba(0,0,0,0.3); position: relative;">
                        <div style="text-align: center; padding: 100px 40px; color: var(--text-dim);">
                            <i data-lucide="lock" style="width: 56px; height: 56px; margin-bottom: 25px; opacity: 0.15; color: var(--accent);"></i>
                            <h3 style="font-family: 'Outfit'; color: #fff; margin-bottom: 10px;">VAULT SECURE</h3>
                            <p style="font-size: 13px; max-width: 300px; margin: 0 auto; line-height: 1.6;">Select a paste or create a new one to begin decryption.</p>
                        </div>
                    </div>
                </div>
            `;

            const list = document.getElementById('vault-list');
            list.innerHTML = vaultSnippets.map(s => {
                const isActive = activeSnippetId === s.id;
                return `
                    <div onclick="editSnippet('${s.id}')" style="padding: 20px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; background: ${isActive ? 'linear-gradient(90deg, rgba(255,45,85,0.08) 0%, rgba(255,45,85,0.02) 100%)' : 'rgba(255,255,255,0.01)'}; border: 1px solid ${isActive ? 'var(--accent)' : 'var(--border)'}; transition: 0.3s; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: space-between;">
                        <div style="flex: 1; min-width: 0;">
                            <div style="font-size: 14px; font-weight: 700; color: ${isActive ? '#fff' : 'var(--text)'}; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${s.title || 'Untitled'}</div>
                            <div style="font-size: 10px; color: var(--text-dim); opacity: 0.6; font-family: 'JetBrains Mono';">${s.content ? s.content.substring(0, 30) + '...' : 'Empty...'}</div>
                        </div>
                        <i data-lucide="trash-2" style="width: 14px; height: 14px; color: var(--text-dim); opacity: 0.5;" onclick="event.stopPropagation(); deleteSnippet('${s.id}')"></i>
                        ${isActive ? '<div style="position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--accent);"></div>' : ''}
                    </div>
                `;
            }).join('');
            
            if (activeSnippetId) {
                const s = vaultSnippets.find(x => x.id === activeSnippetId);
                if (s) renderEditor(s);
            }
            lucide.createIcons();
        }

        function renderEditor(s) {
            document.getElementById('vault-editor').innerHTML = `
                <div style="margin-bottom: 25px;">
                    <label style="font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px; display: block;">PASTE TITLE</label>
                    <input type="text" id="v-title" value="${s.title}" style="width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 18px 25px; border-radius: 14px; color: #fff; font-family: 'Outfit'; font-weight: 900; font-size: 18px; outline: none; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);">
                </div>
                <div style="flex: 1; display: flex; flex-direction: column;">
                    <label style="font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 10px; display: block;">CONTENT / SCRIPT DATA</label>
                    <textarea id="v-content" style="flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 25px; border-radius: 20px; color: #fff; font-family: 'JetBrains Mono'; font-size: 14px; line-height: 1.6; outline: none; resize: none; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);">${s.content}</textarea>
                </div>
                <div style="margin-top: 25px; display: flex; gap: 15px; align-items: center;">
                    <div style="flex: 1; font-size: 11px; color: var(--text-dim); font-weight: 800; letter-spacing: 1px;">ENCRYPTED VIA GITHUB-GIST API</div>
                    <button class="btn btn-accent" style="padding: 15px 40px;" onclick="saveVault()">SAVE & SYNC CLOUD</button>
                </div>
            `;
        }

        function editSnippet(id) {
            activeSnippetId = id;
            renderVault();
        }

        async function saveVault() {
            const s = vaultSnippets.find(x => x.id === activeSnippetId);
            if (s) {
                s.title = document.getElementById('v-title').value;
                s.content = document.getElementById('v-content').value;
            }
            const token = localStorage.getItem('cfx_github_token');
            const gistId = localStorage.getItem('cfx_vault_gistid');
            
            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { 'vault.json': { content: JSON.stringify(vaultSnippets, null, 2) } } })
                });
                if(res.ok) alert("VAULT SYNCED");
                fetchVault();
            } catch(e) { alert("SYNC FAILED"); }
        }

        function addSnippet() {
            const id = `v-${Date.now()}`;
            vaultSnippets.unshift({ id, title: 'New Paste', content: '' });
            activeSnippetId = id;
            renderVault();
        }

        async function deleteSnippet(id) {
            if(!confirm("DELETE?")) return;
            vaultSnippets = vaultSnippets.filter(x => x.id !== id);
            activeSnippetId = null;
            await saveVault();
        }

        function renderVaultSetup() {
            document.getElementById('table-container').innerHTML = `
                <div style="text-align: center; padding: 100px; background: var(--panel); border-radius: 30px; border: 1px solid var(--border);">
                    <i data-lucide="shield-alert" style="width: 60px; height: 60px; color: var(--accent); margin-bottom: 25px;"></i>
                    <h2 style="font-family: 'Outfit'; margin-bottom: 10px;">MASTER VAULT LOCKED</h2>
                    <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 30px;">SET YOUR GITHUB TOKEN AND GIST ID IN THE BROADCAST TAB TO DECRYPT</p>
                </div>
            `;
            lucide.createIcons();
        }

        // --- BROADCAST VIEW ---
        function renderBroadcastView() {
            const container = document.getElementById('table-container');
            container.innerHTML = `
                <div style="padding: 45px; background: var(--panel); border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.4);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                        <h2 style="font-family: 'Outfit'; letter-spacing: 1px;">GLOBAL BROADCAST HUB</h2>
                        <div style="display: flex; gap: 15px; align-items: center;">
                            <div id="bc-status" style="font-size: 9px; font-weight: 950; color: var(--text-dim); letter-spacing: 2px;">READY</div>
                            <select id="bc-target" onchange="loadTargetConfig()" style="background: var(--bg); border: 1px solid var(--border); padding: 8px 15px; border-radius: 10px; color: var(--accent); font-weight: 900; font-size: 11px; outline: none; cursor: pointer; text-transform: uppercase;">
                                <option value="desktop">DESKTOP WORKSTATION</option>
                                <option value="mobile">MOBILE APP</option>
                            </select>
                            <div style="width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981;"></div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 35px;">
                        <div>
                            <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 12px;">GITHUB ACCESS TOKEN</label>
                            <input type="password" id="set-token" placeholder="ghp_..." style="background: var(--bg); border: 1px solid var(--border); padding: 18px 25px; border-radius: 14px; color: #fff; width: 100%; outline: none; font-family: 'JetBrains Mono';">
                        </div>
                        <div>
                            <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 12px;">TARGET GIST ID</label>
                            <input type="text" id="set-gist" placeholder="Paste Gist ID..." style="background: var(--bg); border: 1px solid var(--border); padding: 18px 25px; border-radius: 14px; color: #fff; width: 100%; outline: none; font-family: 'JetBrains Mono';">
                        </div>
                    </div>

                    <div style="border-top: 1px solid var(--border); padding-top: 40px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 25px;">
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 12px;">LIVE VERSION</label>
                                <input type="text" id="bc-version" placeholder="e.g. 5.5.0" style="background: var(--bg); border: 1px solid var(--border); padding: 18px 25px; border-radius: 14px; color: #fff; width: 100%; outline: none;">
                            </div>
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 12px;">MESSAGE TYPE</label>
                                <select id="bc-type" style="background: var(--bg); border: 1px solid var(--border); padding: 18px 25px; border-radius: 14px; color: #fff; width: 100%; outline: none; cursor: pointer;">
                                    <option value="message">ANNOUNCEMENT</option>
                                    <option value="update">FORCE UPDATE</option>
                                    <option value="warning">MAINTENANCE</option>
                                </select>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 25px;">
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 12px;">REDIRECT URL</label>
                                <input type="text" id="bc-url" placeholder="https://..." style="background: var(--bg); border: 1px solid var(--border); padding: 18px 25px; border-radius: 14px; color: #fff; width: 100%; outline: none;">
                            </div>
                            <div>
                                <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 12px;">UPCOMING FEATURES (COMMA SEPARATED)</label>
                                <input type="text" id="bc-upcoming" placeholder="4K Export, Cloud Sync, etc." style="background: var(--bg); border: 1px solid var(--border); padding: 18px 25px; border-radius: 14px; color: #fff; width: 100%; outline: none;">
                            </div>
                        </div>
                        <div style="margin-bottom: 30px;">
                            <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 12px;">GLOBAL ANNOUNCEMENT MESSAGE</label>
                            <textarea id="bc-msg" placeholder="Type message here..." style="background: var(--bg); border: 1px solid var(--border); padding: 20px 25px; border-radius: 14px; color: #fff; width: 100%; height: 100px; outline: none; resize: none; font-family: var(--font-main);"></textarea>
                        </div>
                        <div style="display: flex; gap: 20px;">
                            <button class="btn" style="flex: 1; padding: 20px;" onclick="saveAdminCreds()">UPDATE TARGET CONFIG</button>
                            <button class="btn btn-accent" id="btn-push" style="flex: 2; padding: 20px; font-size: 13px;" onclick="pushBroadcast()">PUSH BROADCAST LIVE</button>
                        </div>
                    </div>
                </div>
            `;
            loadTargetConfig();
            lucide.createIcons();
        }

        async function loadTargetConfig() {
            const target = document.getElementById('bc-target').value;
            document.getElementById('set-token').value = localStorage.getItem('cfx_github_token') || '';
            document.getElementById('set-gist').value = localStorage.getItem(`cfx_gist_${target}`) || '';
            
            // Auto-fetch existing data
            await fetchGistContent();
        }

        async function fetchGistContent() {
            const target = document.getElementById('bc-target').value;
            const token = document.getElementById('set-token').value;
            const gistId = document.getElementById('set-gist').value;
            const status = document.getElementById('bc-status');
            
            if (!token || !gistId) return;

            if (status) {
                status.innerText = "FETCHING LIVE...";
                status.style.color = "var(--blue)";
            }

            try {
                const filename = target === 'mobile' ? 'gistfile2.txt' : 'gistfile1.txt';
                const response = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.files && data.files[filename]) {
                        const content = JSON.parse(data.files[filename].content);
                        document.getElementById('bc-version').value = content.version || '';
                        document.getElementById('bc-msg').value = content.message || '';
                        document.getElementById('bc-type').value = content.type || 'message';
                        document.getElementById('bc-url').value = content.url || '';
                        document.getElementById('bc-upcoming').value = (content.upcoming || []).join(', ');
                        
                        if (status) {
                            status.innerText = "SYNCED";
                            status.style.color = "#10b981";
                        }
                    }
                }
            } catch (e) {
                console.error("Fetch Error:", e);
                if (status) {
                    status.innerText = "SYNC ERROR";
                    status.style.color = "var(--accent)";
                }
            }
        }

        function saveAdminCreds() {
            const target = document.getElementById('bc-target').value;
            localStorage.setItem('cfx_github_token', document.getElementById('set-token').value);
            localStorage.setItem(`cfx_gist_${target}`, document.getElementById('set-gist').value);
            alert(`CONFIG SAVED FOR ${target.toUpperCase()}`);
        }

        async function pushBroadcast() {
            const target = document.getElementById('bc-target').value;
            const token = document.getElementById('set-token').value;
            const gistId = document.getElementById('set-gist').value;
            const msg = document.getElementById('bc-msg').value;
            const url = document.getElementById('bc-url').value;
            const upcomingRaw = document.getElementById('bc-upcoming').value;
            const btn = document.getElementById('btn-push');

            if(!token || !gistId || !msg) return alert("MISSING PARAMS");

            btn.innerText = `PUSHING TO ${target.toUpperCase()}...`;
            btn.disabled = true;

            const upcoming = upcomingRaw ? upcomingRaw.split(',').map(s => s.trim()).filter(s => s !== "") : [];

            const payload = {
                version: document.getElementById('bc-version').value,
                message: msg,
                type: document.getElementById('bc-type').value,
                url: url,
                upcoming: upcoming,
                timestamp: Math.floor(Date.now() / 1000)
            };

            try {
                // Precise target filenames
                const filename = target === 'mobile' ? 'gistfile2.txt' : 'gistfile1.txt';
                const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { [filename]: { content: JSON.stringify(payload, null, 2) } } })
                });
                if(res.ok) alert(`${target.toUpperCase()} BROADCAST LIVE (${filename})`);
                else alert("GITHUB REJECTED PUSH");
            } catch(e) { alert("PUSH FAILED"); }
            finally {
                btn.innerText = "PUSH BROADCAST LIVE";
                btn.disabled = false;
            }
        }

        fetchData();
        lucide.createIcons();
    </script>
</body>
</html>
