<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFX Studios | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030407;
            --sidebar: #07080f;
            --panel: rgba(13, 14, 26, 0.7);
            --accent: #FF2D55;
            --accent-glow: rgba(255, 45, 85, 0.3);
            --blue: #3b82f6;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.03);
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 45, 85, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 45px 0;
            z-index: 1000;
        }

        .logo-area {
            padding: 0 40px;
            margin-bottom: 60px;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

        .nav-group { margin-bottom: 40px; }
        .nav-label {
            padding: 0 40px;
            font-size: 10px;
            font-weight: 950;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.4;
        }

        .nav-item {
            padding: 18px 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            position: relative;
        }
        .nav-item i { width: 18px; height: 18px; opacity: 0.5; transition: 0.3s; }
        
        .nav-item:hover { color: #fff; background: rgba(255, 255, 255, 0.02); }
        .nav-item:hover i { opacity: 1; transform: translateX(3px); color: var(--accent); }

        .nav-item.active {
            color: #fff;
            background: linear-gradient(90deg, rgba(255, 45, 85, 0.1) 0%, transparent 100%);
        }
        .nav-item.active i { color: var(--accent); opacity: 1; filter: drop-shadow(0 0 8px var(--accent)); }
        .nav-item.active::after {
            content: '';
            position: absolute;
            left: 0; top: 20%; height: 60%; width: 3px;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 20px var(--accent);
        }

        /* --- MAIN CONTENT --- */
        header {
            height: 90px;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(3, 4, 7, 0.8);
            backdrop-filter: blur(30px);
            z-index: 10;
        }

        .header-title { 
            font-family: 'Outfit', sans-serif; 
            font-weight: 900; 
            font-size: 20px; 
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-bottom: 50px;
            min-height: 160px;
        }
        .metric-card {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .metric-card:hover { transform: translateY(-8px); border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.03), transparent);
            pointer-events: none;
        }

        .metric-label { font-size: 11px; font-weight: 900; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 12px; text-transform: uppercase; }
        .metric-value { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 38px; letter-spacing: -1px; }

        /* --- TABLE --- */
        .table-panel {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        th {
            padding: 25px 40px;
            font-size: 11px;
            font-weight: 900;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }
        td { padding: 22px 40px; font-size: 14px; border-bottom: 1px solid var(--border); }
        .key-cell { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #fff; letter-spacing: -0.5px; }

        .btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }
        .btn:hover { background: #fff; color: #000; transform: translateY(-2px) scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-danger { color: var(--accent); border-color: rgba(255, 45, 85, 0.2); }
        .btn-danger:hover { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 10px 20px var(--accent-glow); }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 1200px) {
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 900px) {
            /* ... previous mobile styles ... */
            
            /* Vault Mobile Grid */
            #table-container div[style*="grid-template-columns: 300px 1fr"] {
                grid-template-columns: 1fr !important;
                height: auto !important;
            }
        }
...
        function renderVault() {
            const container = document.getElementById('table-container');
            let html = `
                <div style="display: grid; grid-template-columns: 320px 1fr; gap: 25px; height: calc(100vh - 220px);">
                    <!-- SNIPPET LIST -->
                    <div style="background: var(--panel); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.3);">
                        <div style="padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.01);">
                            <div style="font-size: 10px; font-weight: 900; letter-spacing: 2px; color: var(--text-dim);">SAVED SNIPPETS</div>
                            <button class="btn" style="padding: 8px 12px; font-size: 14px; background: var(--accent); color: #fff; border: none;" onclick="addSnippet()">+</button>
                        </div>
                        <div style="flex: 1; overflow-y: auto; padding: 15px;">
            `;

            if (vaultSnippets.length === 0) {
                html += `<div style="text-align: center; color: var(--text-dim); padding: 40px; font-size: 12px; opacity: 0.5;">NO SNIPPETS FOUND</div>`;
            }

            vaultSnippets.forEach((s, idx) => {
                const isActive = activeSnippet === idx;
                html += `
                    <div onclick="editSnippet(${idx})" style="padding: 20px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; background: ${isActive ? 'linear-gradient(90deg, rgba(255,45,85,0.08) 0%, rgba(255,45,85,0.02) 100%)' : 'rgba(255,255,255,0.01)'}; border: 1px solid ${isActive ? 'var(--accent)' : 'var(--border)'}; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;">
                        <div style="font-size: 14px; font-weight: 700; color: ${isActive ? '#fff' : 'var(--text)'}; margin-bottom: 6px;">${s.title || 'Untitled Snippet'}</div>
                        <div style="font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${s.content || 'No content...'}</div>
                        ${isActive ? '<div style="position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--accent); box-shadow: 2px 0 10px var(--accent);"></div>' : ''}
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>
                    <!-- SNIPPET EDITOR -->
                    <div id="snippet-editor" style="background: var(--panel); border-radius: 24px; border: 1px solid var(--border); padding: 35px; display: flex; flex-direction: column; box-shadow: 0 15px 40px rgba(0,0,0,0.3);">
                        <div style="text-align: center; padding: 100px 40px; color: var(--text-dim);">
                            <i data-lucide="file-key" style="width: 56px; height: 56px; margin-bottom: 25px; opacity: 0.15; color: var(--accent);"></i>
                            <h3 style="font-family: 'Outfit'; color: #fff; margin-bottom: 10px;">VAULT DECRYPTED</h3>
                            <p style="font-size: 13px; max-width: 300px; margin: 0 auto; line-height: 1.6;">Select a credential or script from the left to view or edit details.</p>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            lucide.createIcons();
        }

        @media (max-width: 600px) {
            .metrics-grid { grid-template-columns: 1fr; }
            .header-title { display: none; }
            .metric-value { font-size: 20px; }
            .table-panel { border-radius: 16px; }
            td, th { padding: 15px 20px; font-size: 12px; }
        }

        .pagination {
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
        }
        .page-info { font-size: 11px; font-weight: 900; color: var(--text-dim); letter-spacing: 1px; }

        .loading {
            padding: 100px;
            text-align: center;
            font-weight: 950;
            letter-spacing: 5px;
            color: var(--text-dim);
            font-size: 12px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>

    <div class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="logo"><i data-lucide="shield-check" style="color: var(--accent); width: 24px; height: 24px;"></i> CFX<span>STUDIOS</span></div>
            <div style="font-size: 9px; color: var(--text-dim); font-weight: 950; margin-top: 5px; letter-spacing: 2px;">COMMAND CENTER</div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Platforms</div>
            <div class="nav-item active" id="nav-windows" onclick="switchView('windows')">
                <i data-lucide="monitor"></i>
                WINDOWS
            </div>
            <div class="nav-item" id="nav-android" onclick="switchView('android')">
                <i data-lucide="smartphone"></i>
                ANDROID
            </div>
        </div>

        <div class="nav-group">
            <div class="nav-label">Monitoring</div>
            <div class="nav-item" id="nav-trials" onclick="switchView('trials')">
                <i data-lucide="clock"></i>
                GUEST TRIALS
            </div>
            <div class="nav-item" id="nav-broadcast" onclick="switchView('broadcast')">
                <i data-lucide="radio"></i>
                BROADCAST
            </div>
            <div class="nav-item" id="nav-vault" onclick="switchView('vault')">
                <i data-lucide="lock"></i>
                MASTER VAULT
            </div>
        </div>

        <div class="nav-group" style="margin-top: auto; padding-bottom: 20px;">
            <div class="nav-label">System</div>
            <div class="nav-item btn-danger" onclick="flushAllKeys()">
                <i data-lucide="trash-2"></i>
                MASTER FLUSH
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <header>
            <div class="header-title" id="view-title">WINDOWS WORKSTATION LICENSES</div>
            <div class="header-actions">
                <button class="btn" style="background: var(--blue); color: #fff; border: none; display: flex; align-items: center; gap: 8px; padding: 10px 20px;" onclick="fetchData(true)">
                    <i data-lucide="refresh-cw" style="width: 14px; height: 14px;"></i> SYNC NOW
                </button>
                <select id="status-filter" class="search-box" style="width: 150px; background: var(--glass); border: 1px solid var(--border); padding: 10px; border-radius: 12px; font-weight: 700; color: #fff; outline: none; cursor: pointer;" onchange="filterData()">
                    <option value="all" style="background: var(--sidebar); color: #fff;">ALL STATUS</option>
                    <option value="activated" style="background: var(--sidebar); color: #fff;">ACTIVATED</option>
                    <option value="not-activated" style="background: var(--sidebar); color: #fff;">AVAILABLE</option>
                </select>
                <div class="search-container">
                    <input type="text" class="search-box" id="search" placeholder="Search keys or users..." oninput="filterData()">
                </div>
                <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px;">AD</div>
            </div>
        </header>

        <!-- MODAL FOR ADD/EDIT -->
        <div id="license-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center;">
            <div style="background: var(--panel); width: 450px; padding: 40px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.5);">
                <h2 id="modal-title" style="font-family: 'Outfit'; margin-bottom: 25px;">ADD LICENSE</h2>
                <input type="hidden" id="edit-id">
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); margin-bottom: 10px;">LICENSE KEY (ONLY FOR ADD)</label>
                    <input type="text" id="modal-key" placeholder="Enter custom key or leave for auto-gen" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); margin-bottom: 10px;">USER EMAIL / ID</label>
                    <input type="text" id="modal-email" placeholder="user@example.com" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none;">
                </div>

                <div style="margin-bottom: 30px;">
                    <label style="display: block; font-size: 10px; font-weight: 900; color: var(--text-dim); margin-bottom: 10px;">LICENSE STATUS</label>
                    <select id="modal-status" style="background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: #fff; width: 100%; outline: none; cursor: pointer;">
                        <option value="ACTIVE" style="background: var(--sidebar); color: #fff;">ACTIVE / ACTIVATED</option>
                        <option value="EXPIRED" style="background: var(--sidebar); color: #fff;">EXPIRED</option>
                        <option value="REVOKED" style="background: var(--sidebar); color: #fff;">REVOKED</option>
                    </select>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button class="btn" style="flex: 1;" onclick="closeModal()">CANCEL</button>
                    <button class="btn" id="modal-save-btn" style="flex: 1; background: var(--accent); color: #fff; border: none;" onclick="saveLicense()">SAVE LICENSE</button>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="metrics-grid" id="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Total Keys</div>
                    <div class="metric-value" id="stat-total-keys">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Activated</div>
                    <div class="metric-value" id="stat-activated" style="color: var(--blue);">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Remaining</div>
                    <div class="metric-value" id="stat-remaining" style="color: #10b981;">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Trials Active</div>
                    <div class="metric-value" id="stat-active-trials" style="color: var(--accent);">--</div>
                </div>
            </div>

            <div class="table-panel">
                <div id="table-container">
                    <div class="loading">CONNECTING TO CFX CLOUD...</div>
                </div>
                <div class="pagination" id="pagination-controls" style="display: none;">
                    <div class="page-info" id="page-info">PAGE 1 OF 1</div>
                    <div class="page-btns" style="display: flex; gap: 10px;">
                        <button class="btn" onclick="changePage(-1)">PREV</button>
                        <button class="btn" onclick="changePage(1)">NEXT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FB_URL = "https://cfx-scenepack-creator-default-rtdb.firebaseio.com";
        const FB_SECRET = "YH6mWhfrTk0SuHuLUOoX81xgJw5VxM91B3JdFiTf";

        let allLicenses = [];
        let allTrials = [];
        let currentView = 'windows';
        let currentPage = 1;
        const PAGE_SIZE = 20;        let initialSyncDone = false;

        async function switchView(view) {
            if (currentView === view && view !== 'vault') return; 
            currentView = view;
            currentPage = 1;
            
            if (window.innerWidth <= 900) {
                document.getElementById('sidebar').classList.remove('active');
            }

            const filter = document.getElementById('status-filter');
            const metrics = document.getElementById('metrics-grid');
            const search = document.querySelector('.search-container');
            const titleEl = document.getElementById('view-title');
            const pagination = document.getElementById('pagination-controls');

            // Visibility Toggles
            filter.style.display = 'none';
            metrics.style.display = 'none';
            search.style.display = 'none';
            pagination.style.display = 'none';

            if (view === 'windows' || view === 'android' || view === 'trials') {
                filter.style.display = (view === 'trials') ? 'none' : 'block';
                metrics.style.display = 'grid';
                search.style.display = 'flex';
                pagination.style.display = 'flex';
                titleEl.innerText = view.toUpperCase() + (view === 'trials' ? ' GUEST TRIALS' : ' WORKSTATION LICENSES');
            } else if (view === 'broadcast') {
                titleEl.innerText = 'GLOBAL BROADCAST HUB';
            } else if (view === 'vault') {
                titleEl.innerText = 'MASTER VAULT SNIPPETS';
            }

            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const navItem = document.getElementById(`nav-${view}`);
            if(navItem) navItem.classList.add('active');

            // Only fetch if it's the first load OR if it's the Vault (Vault always needs refresh for safety)
            if (!initialSyncDone || view === 'vault') {
                await fetchData();
            } else {
                renderTable(); // Just re-render from cache
            }
        }

        async function fetchData(force = false) {
            const container = document.getElementById('table-container');
            if (currentView === 'vault') return await fetchVault();
            if (currentView === 'broadcast') return renderTable();

            // Prevent flickering if data is already there
            if (!allLicenses.length || force) {
                container.innerHTML = '<div class="loading">SYNCHRONIZING WITH CLOUD...</div>';
            }
            
            try {
                // Fetch both at once for efficiency
                const [lRes, tRes] = await Promise.all([
                    fetch(`${FB_URL}/licenses.json?auth=${FB_SECRET}`),
                    fetch(`${FB_URL}/trials.json?auth=${FB_SECRET}`)
                ]);

                if (!lRes.ok || !tRes.ok) throw new Error("Sync Failed");
                
                const lData = await lRes.json();
                const tData = await tRes.json();
                
                allLicenses = lData ? Object.keys(lData).map(k => ({ id: k, ...lData[k] })) : [];
                allTrials = tData ? Object.keys(tData).map(k => ({ id: k, ...tData[k] })) : [];
                
                initialSyncDone = true;
                updateStats();
                renderTable();
            } catch (err) {
                container.innerHTML = `<div class="loading" style="color: var(--accent);">CLOUD CONNECTION LOST<br><span style="font-size: 10px; opacity: 0.5;">HTTP ERROR</span></div>`;
            }
        }

        function updateStats() {
            const activated = allLicenses.filter(l => l.email || l.userEmail || l.status === 'ACTIVE').length;
            const remaining = allLicenses.length - activated;
            document.getElementById('stat-total-keys').innerText = allLicenses.length;
            document.getElementById('stat-activated').innerText = activated;
            document.getElementById('stat-remaining').innerText = remaining;
            document.getElementById('stat-active-trials').innerText = allTrials.length;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
        // --- VAULT LOGIC ---
        let vaultSnippets = [];
        let activeSnippet = null;

        async function fetchVault() {
            const token = localStorage.getItem('cfx_github_token');
            const vaultGistId = localStorage.getItem('cfx_vault_gistid');
            const container = document.getElementById('table-container');
            
            if (!token || !vaultGistId) {
                container.innerHTML = `
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 40px; min-height: 400px; background: radial-gradient(circle at center, rgba(255, 45, 85, 0.05) 0%, transparent 70%); border-radius: 30px;">
                        <div style="position: relative; margin-bottom: 30px;">
                            <i data-lucide="shield-off" style="width: 80px; height: 80px; color: var(--accent); opacity: 0.8; filter: drop-shadow(0 0 15px var(--accent-glow));"></i>
                        </div>
                        <h2 style="font-family: 'Outfit'; font-size: 28px; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 0 20px var(--accent-glow);">MASTER VAULT LOCKED</h2>
                        <p style="color: var(--text-dim); font-size: 13px; font-weight: 700; margin-bottom: 40px; letter-spacing: 1px; opacity: 0.6;">INITIALIZE PRIVATE GIST TO DECRYPT OPERATIONAL DATA</p>
                        
                        <div style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; align-items: center;">
                            <input type="text" id="vault-gist-setup" placeholder="PASTE PRIVATE GIST ID" style="background: var(--bg); border: 1px solid var(--border); padding: 18px 25px; border-radius: 15px; color: #fff; width: 100%; outline: none; font-family: 'JetBrains Mono', monospace; font-size: 12px; text-align: center; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);">
                            <button class="btn" style="width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; font-size: 12px; box-shadow: 0 10px 20px var(--accent-glow);" onclick="setupVault()">INITIALIZE SECURE ACCESS</button>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = '<div class="loading">DECRYPTING VAULT...</div>';

            try {
                const res = await fetch(`https://api.github.com/gists/${vaultGistId}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                if (data.message === "Not Found") throw new Error("Gist Not Found");
                vaultSnippets = (data.files && data.files['vault.json']) ? JSON.parse(data.files['vault.json'].content) : [];
                renderVault();
            } catch (e) {
                console.error("Vault Fetch Error:", e);
                container.innerHTML = `
                    <div style="padding: 100px 40px; text-align: center; background: radial-gradient(circle at center, rgba(255, 45, 85, 0.05) 0%, transparent 70%); border-radius: 30px;">
                        <i data-lucide="cloud-off" style="width: 60px; height: 60px; color: var(--accent); margin-bottom: 25px; opacity: 0.8;"></i>
                        <h2 style="font-family: 'Outfit'; margin-bottom: 10px; color: var(--accent);">VAULT FETCH FAILED</h2>
                        <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 30px; opacity: 0.6;">THE PROVIDED GIST ID MAY BE INVALID OR PRIVATE ACCESS DENIED</p>
                        <button class="btn btn-danger" style="padding: 15px 30px;" onclick="resetVault()">CLEAR INVALID CONNECTION</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function setupVault() {
            let id = document.getElementById('vault-gist-setup').value.trim();
            if(id) {
                // If user pasted a full URL, extract the last part
                if (id.includes('/')) {
                    const parts = id.split('/');
                    id = parts[parts.length - 1];
                }
                localStorage.setItem('cfx_vault_gistid', id);
                fetchVault();
            }
        }

        function resetVault() {
            if(!confirm("RESET VAULT CONNECTION?")) return;
            localStorage.removeItem('cfx_vault_gistid');
            fetchVault();
        }

        function renderVault() {
            const container = document.getElementById('table-container');
            const searchQuery = document.getElementById('vault-search')?.value.toLowerCase() || '';
            
            // Initial shell if not present
            if (!container.querySelector('#vault-list')) {
                container.innerHTML = `
                    <div style="display: grid; grid-template-columns: 320px 1fr; gap: 25px; height: calc(100vh - 220px);">
                        <div style="background: var(--panel); border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.3);">

                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        <div style="font-size: 10px; font-weight: 900; letter-spacing: 2px; color: var(--text-dim);">PASTEBIN VAULT</div>
                                        <button onclick="resetVault()" title="Reset Connection" style="background: transparent; border: none; cursor: pointer; display: flex; align-items: center; opacity: 0.3; color: var(--text-dim);"><i data-lucide="refresh-ccw" style="width: 10px; height: 10px;"></i></button>
                                    </div>

                                <input type="text" id="vault-search" placeholder="Search pastes..." oninput="renderVault()" style="width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 10px; color: #fff; font-size: 12px; outline: none;">
                            </div>
                            <div id="vault-list" style="flex: 1; overflow-y: auto; padding: 15px;"></div>
                        </div>
                        <div id="snippet-editor" style="background: var(--panel); border-radius: 24px; border: 1px solid var(--border); padding: 35px; display: flex; flex-direction: column; box-shadow: 0 15px 40px rgba(0,0,0,0.3);">
                            <div style="text-align: center; padding: 100px 40px; color: var(--text-dim);">
                                <i data-lucide="clipboard-copy" style="width: 56px; height: 56px; margin-bottom: 25px; opacity: 0.15; color: var(--accent);"></i>
                                <h3 style="font-family: 'Outfit'; color: #fff; margin-bottom: 10px;">PASTEBIN READY</h3>
                                <p style="font-size: 13px; max-width: 300px; margin: 0 auto; line-height: 1.6;">Select a paste from the left or create a new one to start storing data.</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            const listContainer = document.getElementById('vault-list');
            let html = '';

            const filtered = vaultSnippets.filter(s => 
                (s.title || '').toLowerCase().includes(searchQuery) || 
                (s.content || '').toLowerCase().includes(searchQuery)
            );

            if (filtered.length === 0) {
                html = `<div style="text-align: center; color: var(--text-dim); padding: 40px; font-size: 12px; opacity: 0.5;">NO PASTES MATCHING...</div>`;
            }

            filtered.forEach((s) => {
                const realIdx = vaultSnippets.indexOf(s);
                const isActive = activeSnippet === realIdx;
                html += `
                    <div onclick="editSnippet(${realIdx})" style="padding: 20px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; background: ${isActive ? 'linear-gradient(90deg, rgba(255,45,85,0.08) 0%, rgba(255,45,85,0.02) 100%)' : 'rgba(255,255,255,0.01)'}; border: 1px solid ${isActive ? 'var(--accent)' : 'var(--border)'}; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;">
                        <div style="font-size: 14px; font-weight: 700; color: ${isActive ? '#fff' : 'var(--text)'}; margin-bottom: 6px;">${s.title || 'Untitled Paste'}</div>
                        <div style="font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${s.content || 'No content...'}</div>

        function editSnippet(idx) {
            activeSnippet = idx;
            const s = vaultSnippets[idx];
            document.getElementById('snippet-editor').innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">

                <textarea id="edit-content" style="flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 25px; border-radius: 20px; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.6; outline: none; resize: none;" placeholder="Paste content here...">${s.content}</textarea>

        function addSnippet() {
            vaultSnippets.unshift({ title: 'New Paste', content: '' });
            activeSnippet = 0;
            editSnippet(0);
        }

        async function deleteSnippet(idx) {
            if(!confirm("DELETE THIS PASTE PERMANENTLY?")) return;
            vaultSnippets.splice(idx, 1);
            activeSnippet = null;
            await saveVault();
        }

        function copyPaste() {
            const content = document.getElementById('edit-content').value;
            navigator.clipboard.writeText(content);
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="check" style="width: 14px; height: 14px;"></i> COPIED!';
            lucide.createIcons();
            setTimeout(() => { btn.innerHTML = originalText; lucide.createIcons(); }, 2000);
        }

        async function saveVault() {
            const status = document.getElementById('vault-save-status');
            const token = localStorage.getItem('cfx_github_token');
            const vaultGistId = localStorage.getItem('cfx_vault_gistid');
            
            if(activeSnippet !== null) {
                vaultSnippets[activeSnippet].title = document.getElementById('edit-title').value;
                vaultSnippets[activeSnippet].content = document.getElementById('edit-content').value;
            }

            if(status) { status.innerText = "SYNCING TO CLOUD..."; status.style.color = "var(--blue)"; }

            try {
                const res = await fetch(`https://api.github.com/gists/${vaultGistId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { 'vault.json': { content: JSON.stringify(vaultSnippets, null, 2) } } })
                });
                if(res.ok) {
                    if(status) { status.innerText = "PASTE SYNCED SUCCESSFUL"; status.style.color = "#10b981"; }
                    renderVault();
                } else { throw new Error(); }
            } catch (e) { 
                if(status) { status.innerText = "SYNC FAILED"; status.style.color = "var(--accent)"; }
            }
        }

        // Load Credentials
        function loadCredentials() {
            const target = document.getElementById('bc-target').value;
            document.getElementById('bc-token').value = localStorage.getItem('cfx_github_token') || '';
            document.getElementById('bc-gistid').value = localStorage.getItem(`cfx_gist_${target}`) || '';
            document.getElementById('bc-filename').value = localStorage.getItem(`cfx_file_${target}`) || 'gistfile1.txt';
            
            if (localStorage.getItem(`cfx_gist_${target}`)) {
                fetchGistContent();
            }
        }

        async function fetchGistContent() {
            const token = document.getElementById('bc-token').value;
            const gistId = document.getElementById('bc-gistid').value;
            const filename = document.getElementById('bc-filename').value || 'gistfile1.txt';
            const status = document.getElementById('bc-status');

            if (!token || !gistId) return;

            if (status) {
                status.innerText = "FETCHING...";
                status.style.color = "var(--blue)";
            }

            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.files && data.files[filename]) {
                        const content = JSON.parse(data.files[filename].content);
                        document.getElementById('bc-version').value = content.version || '';
                        document.getElementById('bc-msg').value = content.message || '';
                        document.getElementById('bc-type').value = content.type || 'message';
                        document.getElementById('bc-url').value = content.url || '';
                        document.getElementById('bc-upcoming').value = (content.upcoming || []).join(', ');
                        
                        if (status) {
                            status.innerText = "SYNCED";
                            status.style.color = "#10b981";
                        }
                    } else {
                        if (status) {
                            status.innerText = "FILE NOT FOUND";
                            status.style.color = "var(--accent)";
                        }
                    }
                } else {
                    if (status) {
                        status.innerText = "GIST NOT FOUND";
                        status.style.color = "var(--accent)";
                    }
                }
            } catch (e) {
                console.error("Gist Fetch Error:", e);
                if (status) {
                    status.innerText = "NETWORK ERROR";
                    status.style.color = "var(--accent)";
                }
            }
        }

        // Save Credentials
        function saveCredentials() {
            const target = document.getElementById('bc-target').value;
            const token = document.getElementById('bc-token').value;
            const gistId = document.getElementById('bc-gistid').value;
            const filename = document.getElementById('bc-filename').value;
            
            if(token) localStorage.setItem('cfx_github_token', token);
            if(gistId) localStorage.setItem(`cfx_gist_${target}`, gistId);
            if(filename) localStorage.setItem(`cfx_file_${target}`, filename);
        }

        async function pushBroadcast() {
            const token = document.getElementById('bc-token').value;
            const gistId = document.getElementById('bc-gistid').value;
            const filename = document.getElementById('bc-filename').value || 'gistfile1.txt';
            const version = document.getElementById('bc-version').value;
            const message = document.getElementById('bc-msg').value;
            const type = document.getElementById('bc-type').value;
            const url = document.getElementById('bc-url').value;
            const upcomingRaw = document.getElementById('bc-upcoming').value;
            const btn = document.getElementById('btn-push');

            if(!token || !gistId || !message) {
                alert("TOKEN, GIST ID, AND MESSAGE ARE REQUIRED");
                return;
            }

            saveCredentials(); // Persist for next time

            if(!confirm(`Push this ${type.toUpperCase()} to all ${document.getElementById('bc-target').value} workstations?`)) return;

            btn.innerText = "UPLOADING TO GITHUB...";
            btn.disabled = true;

            // Parse upcoming into array
            const upcoming = upcomingRaw ? upcomingRaw.split(',').map(s => s.trim()).filter(s => s !== "") : [];

            const payload = JSON.stringify({
                version: version,
                message: message,
                type: type,
                url: url,
                upcoming: upcoming,
                timestamp: Math.floor(Date.now() / 1000)
            }, null, 2);

            try {
                const response = await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            [filename]: {
                                content: payload
                            }
                        }
                    })
                });

                if (response.ok) {
                    const targetName = document.getElementById('bc-target').value.toUpperCase();
                    alert(`BROADCAST LIVE ON ALL ${targetName} INSTANCES`);
                } else {
                    const err = await response.json();
                    alert("GITHUB ERROR: " + (err.message || "Check Token/Gist ID"));
                }
            } catch (e) {
                alert("NETWORK ERROR: " + e.message);
            } finally {
                btn.innerText = "PUSH GLOBAL BROADCAST";
                btn.disabled = false;
            }
        }

        async function wipeTrial(id) {
            if(!confirm(`Wipe trial record ${id}?`)) return;
            await fetch(`${FB_URL}/trials/${id}.json?auth=${FB_SECRET}`, { method: 'DELETE' });
            fetchData();
        }

        fetchData();
        setInterval(fetchData, 30000);
    </script>
