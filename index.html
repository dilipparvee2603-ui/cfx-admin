<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFX Command Center | SaaS Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030407;
            --sidebar: #06070c;
            --panel: rgba(13, 14, 26, 0.7);
            --accent: #ff2d55;
            --accent-glow: rgba(255, 45, 85, 0.4);
            --blue: #3b82f6;
            --text: #ffffff;
            --text-dim: #8a8fb5;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- SAAS LAYOUT --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, #1a1c2e 0%, var(--bg) 80%);
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            flex-shrink: 0;
        }

        .brand-area {
            padding: 0 10px;
            margin-bottom: 50px;
        }
        .brand-name { font-family: 'Outfit'; font-weight: 900; font-size: 18px; letter-spacing: 1px; color: #fff; }
        .brand-sub { font-size: 10px; color: var(--text-dim); font-weight: 800; letter-spacing: 2px; margin-top: 4px; }

        .nav-group { margin-bottom: 30px; }
        .nav-label { font-size: 10px; font-weight: 800; color: var(--text-dim); letter-spacing: 2px; margin: 20px 0 10px 10px; text-transform: uppercase; opacity: 0.5; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
            cursor: pointer;
            margin-bottom: 4px;
        }
        .nav-item i { width: 18px; height: 18px; opacity: 0.6; }
        .nav-item:hover { color: #fff; background: var(--glass); }
        .nav-item.active { 
            color: #fff; 
            background: rgba(255, 45, 85, 0.08); 
            border: 1px solid rgba(255, 45, 85, 0.2);
            box-shadow: inset 0 0 15px rgba(255, 45, 85, 0.05);
        }
        .nav-item.active i { color: var(--accent); opacity: 1; }

        /* --- MAIN CONTENT --- */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            height: 90px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(3, 4, 7, 0.4);
            flex-shrink: 0;
        }

        .header-title { font-family: 'Outfit'; font-weight: 900; font-size: 22px; letter-spacing: 1px; }

        .search-wrapper { position: relative; width: 350px; }
        .search-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; width: 16px; }
        .search-box {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 12px 15px 12px 45px;
            border-radius: 14px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: var(--transition);
        }
        .search-box:focus { border-color: var(--blue); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }

        .content-scroller {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* --- COMPONENTS --- */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 40px; }
        .stat-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.15); }
        .stat-label { font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-value { font-size: 32px; font-family: 'Outfit'; font-weight: 900; }

        .table-container { background: var(--panel); border-radius: 28px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px 25px; font-size: 11px; font-weight: 800; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.01); }
        td { padding: 20px 25px; font-size: 13px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--glass); }

        .status-pill { padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; border: 1px solid transparent; }
        .status-active { background: rgba(59, 130, 246, 0.1); color: var(--blue); border-color: rgba(59, 130, 246, 0.2); }
        .status-idle { background: rgba(255, 255, 255, 0.05); color: var(--text-dim); border-color: var(--border); }

        .btn-elite {
            background: var(--glass);
            color: #fff;
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px;
            font-family: 'Outfit';
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-elite:hover { background: var(--glass-strong); transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
        .btn-accent { background: var(--accent); border: none; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-accent:hover { filter: brightness(1.1); box-shadow: 0 15px 30px var(--accent-glow); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #0d0e1a; width: 500px; border-radius: 30px; padding: 40px; border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.8); }

        #toast-container { position: fixed; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 12px; z-index: 1100; }
        .toast { background: #11121d; border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 16px 25px; border-radius: 12px; display: flex; align-items: center; gap: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); animation: toastIn 0.3s ease-out; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside id="sidebar">
            <div class="brand-area">
                <div class="brand-name">CFXSTUDIOS</div>
                <div class="brand-sub">COMMAND CENTER</div>
            </div>

            <div class="nav-group">
                <div class="nav-label">OVERVIEW</div>
                <div class="nav-item active" id="nav-home" onclick="switchView('home')">
                    <i data-lucide="layout-dashboard"></i> DASHBOARD
                </div>
                
                <div class="nav-label">PLATFORMS</div>
                <div class="nav-item" id="nav-windows" onclick="switchView('windows')">
                    <i data-lucide="monitor"></i> WINDOWS
                </div>
                <div class="nav-item" id="nav-android" onclick="switchView('android')">
                    <i data-lucide="smartphone"></i> ANDROID
                </div>

                <div class="nav-label">MONITORING</div>
                <div class="nav-item" id="nav-trials" onclick="switchView('trials')">
                    <i data-lucide="clock"></i> GUEST TRIALS
                </div>
                <div class="nav-item" id="nav-broadcast" onclick="switchView('broadcast')">
                    <i data-lucide="radio"></i> BROADCAST
                </div>
                <div class="nav-item" id="nav-vault" onclick="switchView('vault')">
                    <i data-lucide="shield-check"></i> MASTER VAULT
                </div>

                <div class="nav-label">SYSTEM</div>
                <div class="nav-item" style="color: var(--accent); opacity: 0.6;" onclick="masterFlush()">
                    <i data-lucide="zap"></i> MASTER FLUSH
                </div>
            </div>

            <div style="margin-top: auto; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px;">
                <div style="width: 32px; height: 32px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px;">AD</div>
                <div>
                    <div style="font-size: 12px; font-weight: 700;">ADMINISTRATOR</div>
                    <div style="font-size: 10px; color: var(--text-dim);">Root System Access</div>
                </div>
            </div>
        </aside>

        <main class="main-stage">
            <header>
                <div id="header-meta">
                    <div class="header-title" id="view-title">DASHBOARD</div>
                    <div id="view-subtitle" style="font-size: 10px; color: var(--text-dim); font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">Real-time System Status</div>
                </div>

                <div style="display: flex; align-items: center; gap: 20px;">
                    <div class="search-wrapper">
                        <i data-lucide="search"></i>
                        <input type="text" class="search-box" id="search" placeholder="Search keys, sessions, or logs..." oninput="filterData()">
                    </div>
                    <button class="btn-elite" onclick="fetchData(true)">
                        <i data-lucide="refresh-cw" style="width: 14px;"></i> SYNC NOW
                    </button>
                </div>
            </header>

            <div class="content-scroller" id="content-area">
                <!-- Data injected here -->
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="font-family: 'Outfit'; margin-bottom: 30px;">GENERATE LICENSE</h2>
            <div id="modal-body" style="display: flex; flex-direction: column; gap: 20px;">
                <!-- Modal content injected here -->
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const FB_URL = "https://cfx-scenepack-creator-default-rtdb.firebaseio.com";
        const FB_SECRET = "YH6mWhfrTk0SuHuLUOoX81xgJw5VxM91B3JdFiTf";
        
        let allLicenses = [];
        let allTrials = [];
        let vaultSnippets = [];
        let currentView = 'home';
        let itemsPerPage = 10;
        let currentPage = 1;
        let activeSnippetId = null;

        // --- TOAST ---
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'success' ? '#10b981' : (type === 'error' ? 'var(--accent)' : 'var(--blue)');
            toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'info'}" style="width: 18px; color: ${type === 'success' ? '#10b981' : (type === 'error' ? 'var(--accent)' : 'var(--blue)')}"></i> <span style="font-size: 13px; font-weight: 600;">${msg}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(50px)';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        async function switchView(view) {
            currentView = view;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const navItem = document.getElementById(`nav-${view}`);
            if(navItem) navItem.classList.add('active');

            const title = document.getElementById('view-title');
            const subtitle = document.getElementById('view-subtitle');
            
            const meta = {
                'home': ['DASHBOARD', 'Executive System Overview'],
                'windows': ['WINDOWS LICENSES', 'Workstation Management'],
                'android': ['ANDROID FLEET', 'Mobile Device Deployment'],
                'trials': ['GUEST TRIALS', 'Live Session Monitoring'],
                'broadcast': ['BROADCAST HUB', 'Global Announcement System'],
                'vault': ['MASTER VAULT', 'Secure Script Storage']
            };
            [title.innerText, subtitle.innerText] = meta[view] || ['ADMIN', ''];

            if(view === 'home') renderHome();
            else if(view === 'vault') await fetchVault();
            else await fetchData();
        }

        async function fetchData(force = false) {
            if(force) showToast("SYNCING CLOUD DATA...", "info");
            try {
                const res = await fetch(`${FB_URL}/.json?auth=${FB_SECRET}`);
                const data = await res.json();
                allLicenses = Object.keys(data.windows || {}).map(k => ({ key: k, ...data.windows[k] }));
                allTrials = Object.keys(data.trials || {}).map(k => ({ id: k, ...data.trials[k] }));
                
                if(force) showToast("SYSTEM SYNC SUCCESSFUL", "success");
                if(currentView === 'home') renderHome();
                else renderTable();
            } catch(e) { showToast("SYNC FAILED", "error"); }
        }

        function renderHome() {
            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div class="dashboard-grid">
                    <div class="stat-card">
                        <div class="stat-label">Windows Nodes</div>
                        <div class="stat-value" style="color: var(--blue);">${allLicenses.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Licenses</div>
                        <div class="stat-value" style="color: #10b981;">${allLicenses.filter(k => k.activated).length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Trial Sessions</div>
                        <div class="stat-value" style="color: var(--accent);">${allTrials.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Vault Snippets</div>
                        <div class="stat-value">${vaultSnippets.length}</div>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
                    <div class="table-container" style="padding: 35px;">
                        <h3 style="font-family: 'Outfit'; margin-bottom: 25px; display: flex; align-items: center; gap: 10px;">
                            <i data-lucide="activity" style="color: var(--blue);"></i> SYSTEM LOGS
                        </h3>
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <div style="padding: 15px; background: var(--glass); border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between;">
                                <div style="font-size: 13px;">Firebase Connection</div>
                                <div style="font-size: 11px; font-weight: 800; color: #10b981;">STABLE</div>
                            </div>
                            <div style="padding: 15px; background: var(--glass); border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between;">
                                <div style="font-size: 13px;">GitHub Gist Engine</div>
                                <div style="font-size: 11px; font-weight: 800; color: #10b981;">STABLE</div>
                            </div>
                        </div>
                    </div>
                    <div class="table-container" style="padding: 35px;">
                        <h3 style="font-family: 'Outfit'; margin-bottom: 25px;">SHORTCUTS</h3>
                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <button class="btn-elite" style="width: 100%; justify-content: flex-start;" onclick="switchView('windows'); openModal();">NEW LICENSE</button>
                            <button class="btn-elite" style="width: 100%; justify-content: flex-start;" onclick="switchView('vault'); addSnippet();">NEW PASTE</button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderTable() {
            const container = document.getElementById('content-area');
            const data = currentView === 'windows' ? allLicenses : allTrials;
            
            container.innerHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                ${currentView === 'windows' ? '<th>KEY</th><th>STATUS</th><th>HWID</th><th>ACTIONS</th>' : '<th>SESSION</th><th>MODEL</th><th>TIME</th><th>ACTION</th>'}
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(item => `
                                <tr>
                                    ${currentView === 'windows' ? `
                                        <td style="font-family: 'JetBrains Mono'; font-weight: 700;">${item.key}</td>
                                        <td><span class="status-pill ${item.activated ? 'status-active' : 'status-idle'}">${item.activated ? 'ACTIVE' : 'IDLE'}</span></td>
                                        <td style="color: var(--text-dim); font-size: 11px;">${item.hwid || 'N/A'}</td>
                                        <td><button class="btn-elite" style="padding: 6px 12px; font-size: 10px;" onclick="editLicense('${item.key}')">EDIT</button></td>
                                    ` : `
                                        <td style="font-family: 'JetBrains Mono'; font-size: 12px;">${item.id.substring(0, 10)}...</td>
                                        <td>${item.model || 'GENERIC'}</td>
                                        <td style="color: var(--text-dim);">${item.startTime || '--'}</td>
                                        <td><button class="btn-elite" style="color: var(--accent);" onclick="deleteTrial('${item.id}')">REVOKE</button></td>
                                    `}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            lucide.createIcons();
        }

        // --- VAULT ENGINE ---
        async function fetchVault() {
            const token = localStorage.getItem('cfx_github_token');
            const gistId = localStorage.getItem('cfx_vault_gistid');
            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                vaultSnippets = JSON.parse(data.files['vault.json'].content);
                renderVault();
            } catch(e) { showToast("VAULT OFFLINE", "error"); }
        }

        function renderVault() {
            const container = document.getElementById('content-area');
            container.innerHTML = `
                <div style="display: grid; grid-template-columns: 320px 1fr; gap: 30px; height: calc(100vh - 220px);">
                    <div class="table-container" style="display: flex; flex-direction: column;">
                        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
                            <button class="btn-elite" style="width: 100%;" onclick="addSnippet()">NEW PASTE</button>
                        </div>
                        <div style="flex: 1; overflow-y: auto; padding: 15px;">
                            ${vaultSnippets.map(s => `
                                <div onclick="editSnippet('${s.id}')" style="padding: 15px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; background: ${activeSnippetId === s.id ? 'rgba(255,45,85,0.1)' : 'var(--glass)'}; border: 1px solid ${activeSnippetId === s.id ? 'var(--accent)' : 'var(--border)'};">
                                    <div style="font-size: 13px; font-weight: 700;">${s.title || 'Untitled'}</div>
                                    <div style="font-size: 10px; color: var(--text-dim); margin-top: 4px;">${s.id}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div id="snippet-editor" class="table-container" style="padding: 30px;">
                        <div style="text-align: center; padding: 100px; opacity: 0.3;">SELECT A PASTE</div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function editSnippet(id) {
            activeSnippetId = id;
            const s = vaultSnippets.find(x => x.id === id);
            const editor = document.getElementById('snippet-editor');
            editor.innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 20px; height: 100%;">
                    <input type="text" id="edit-title" value="${s.title || ''}" placeholder="Paste Title..." style="background: transparent; border: none; border-bottom: 1px solid var(--border); color: #fff; font-family: 'Outfit'; font-size: 20px; outline: none; padding: 10px 0;">
                    <textarea id="edit-content" style="flex: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-family: 'JetBrains Mono'; font-size: 13px; padding: 20px; outline: none; resize: none;">${s.content || ''}</textarea>
                    <div style="display: flex; justify-content: flex-end; gap: 15px;">
                        <button class="btn-elite" onclick="deleteSnippet('${id}')" style="color: var(--accent);">DELETE</button>
                        <button class="btn-elite btn-accent" onclick="saveVault()">SAVE & SYNC</button>
                    </div>
                </div>
            `;
            renderVault();
        }

        function addSnippet() {
            const id = `v-${Date.now()}`;
            vaultSnippets.unshift({ id, title: 'New Paste', content: '' });
            editSnippet(id);
        }

        async function saveVault() {
            const s = vaultSnippets.find(x => x.id === activeSnippetId);
            s.title = document.getElementById('edit-title').value;
            s.content = document.getElementById('edit-content').value;
            showToast("SYNCING VAULT...", "info");
            
            const token = localStorage.getItem('cfx_github_token');
            const gistId = localStorage.getItem('cfx_vault_gistid');
            try {
                await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { 'vault.json': { content: JSON.stringify(vaultSnippets, null, 2) } } })
                });
                showToast("VAULT UPDATED", "success");
                renderVault();
            } catch(e) { showToast("SAVE FAILED", "error"); }
        }

        async function deleteSnippet(id) {
            if(!confirm("DELETE PASTE?")) return;
            vaultSnippets = vaultSnippets.filter(x => x.id !== id);
            activeSnippetId = null;
            await saveVault();
        }

        function masterFlush() {
            if(confirm("DANGER: WIPE ALL LIVE TRIALS?")) {
                fetch(`${FB_URL}/trials.json?auth=${FB_SECRET}`, { method: 'DELETE' })
                    .then(() => { showToast("MASTER FLUSH COMPLETE", "success"); fetchData(); });
            }
        }

        window.onload = () => { switchView('home'); lucide.createIcons(); };
    </script>
</body>
</html>
